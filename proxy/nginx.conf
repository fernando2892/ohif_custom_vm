user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip para metadatos JSON
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types application/dicom+json application/json text/plain;
    gzip_proxied any;
    gzip_comp_level 4;

    # Cache para DICOM - 5GB max, 1 día de inactividad
    proxy_cache_path /var/cache/nginx/dicom
        levels=1:2
        keys_zone=dicom:100m
        max_size=5g
        inactive=1d
        use_temp_path=off;

    # Upstream al PACS VIEWMED
    upstream pacs_backend {
        server developer.viewmedonline.com:80;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Accept,Accept-Encoding' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        # Manejar OPTIONS preflight
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Proxy /pacs/ al PACS real (para que OHIF use rutas relativas)
        location /pacs/ {
            proxy_pass http://pacs_backend/dcm4chee-arc/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 300s;
            
            # Cache agresivo para DICOM
            proxy_cache dicom;
            proxy_cache_valid 200 1d;
            proxy_cache_valid 206 1d;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_key "$scheme$request_method$host$request_uri$http_accept";
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;
            
            # Headers al backend
            proxy_set_header Host developer.viewmedonline.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Accept $http_accept;
            
            add_header X-Cache-Status $upstream_cache_status always;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
