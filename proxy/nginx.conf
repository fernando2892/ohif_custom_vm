# Montaje: docker-compose → ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
#
# Si ves 502 "connect() failed ... upstream: https://34.x:443": el DNS público apunta a una IP
# a la que Docker no puede llegar por 443. Cambia SOLO `server ...` en `upstream viewmed_pacs`
# (p. ej. IP Tailscale/VPN). Mantén Host y proxy_ssl_name en el FQDN del certificado del archive.

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'cache=$upstream_cache_status rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types application/dicom+json application/json text/plain;
    gzip_proxied any;
    gzip_comp_level 4;

    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 128 16k;
    proxy_busy_buffers_size 128k;

    open_file_cache max=2000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    proxy_cache_path /var/cache/nginx/metadata
        levels=1:2
        keys_zone=metadata:50m
        max_size=500m
        inactive=30m
        use_temp_path=off;

    proxy_cache_path /var/cache/nginx/dicom
        levels=1:2
        keys_zone=dicom:200m
        max_size=10g
        inactive=2d
        use_temp_path=off;

    proxy_cache_path /var/cache/nginx/studies
        levels=1:2
        keys_zone=studies:10m
        max_size=50m
        inactive=5m
        use_temp_path=off;

    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=frames:10m rate=300r/s;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # Destino HTTP (PACS sin SSL).
    upstream viewmed_pacs {
        server developer.viewmedonline.com:443;
        keepalive 64;
    }

    server {
        listen 80;
        server_name localhost;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Accept,Accept-Encoding,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,X-Cache-Status' always;

        proxy_ssl_server_name on;
        proxy_ssl_name developer.viewmedonline.com;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_ssl_verify off;

        location ~ ^/pacs/aets/VIEWMED/rs/studies/[^/]+/series$ {
            include /etc/nginx/cors_options.inc;
            rewrite ^/pacs/(.*)$ /dcm4chee-arc/$1 break;
            limit_conn conn_per_ip 20;
            limit_req zone=api burst=100 nodelay;

            proxy_pass https://viewmed_pacs;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 60s;

            proxy_cache metadata;
            proxy_cache_valid 200 30m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_key "$scheme$request_method$host$request_uri$http_accept";
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;
            proxy_cache_revalidate on;
            proxy_cache_min_uses 1;

            proxy_set_header Host developer.viewmedonline.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header X-Cache-Status $upstream_cache_status always;
        }

        location ~ ^/pacs/aets/VIEWMED/rs/studies/[^/]+$ {
            include /etc/nginx/cors_options.inc;
            rewrite ^/pacs/(.*)$ /dcm4chee-arc/$1 break;
            limit_conn conn_per_ip 10;
            limit_req zone=api burst=50 nodelay;

            proxy_pass https://viewmed_pacs;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 30s;

            proxy_cache metadata;
            proxy_cache_valid 200 15m;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_key "$scheme$request_method$host$request_uri$http_accept";
            proxy_cache_lock on;

            proxy_set_header Host developer.viewmedonline.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            add_header X-Cache-Status $upstream_cache_status always;
        }

        location ~ ^/pacs/aets/VIEWMED/rs/studies/.+/frames/ {
            include /etc/nginx/cors_options.inc;
            rewrite ^/pacs/(.*)$ /dcm4chee-arc/$1 break;
            limit_conn conn_per_ip 30;
            limit_req zone=frames burst=200 nodelay;

            proxy_pass https://viewmed_pacs;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 15s;
            proxy_send_timeout 15s;
            proxy_read_timeout 120s;

            proxy_cache dicom;
            proxy_cache_valid 200 1d;
            proxy_cache_valid 206 0;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_key "$scheme$request_method$host$request_uri$http_accept";
            proxy_cache_lock on;
            proxy_cache_lock_timeout 10s;
            proxy_cache_revalidate on;
            proxy_cache_min_uses 1;

            proxy_set_header Host developer.viewmedonline.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Accept $http_accept;

            add_header X-Cache-Status $upstream_cache_status always;
        }

        location ~ ^/pacs/aets/VIEWMED/rs/studies$ {
            include /etc/nginx/cors_options.inc;
            rewrite ^/pacs/(.*)$ /dcm4chee-arc/$1 break;
            limit_conn conn_per_ip 5;
            limit_req zone=api burst=20 nodelay;

            proxy_pass https://viewmed_pacs;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 30s;

            proxy_cache studies;
            proxy_cache_valid 200 5m;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_key "$scheme$request_method$host$request_uri$http_accept";

            proxy_set_header Host developer.viewmedonline.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            add_header X-Cache-Status $upstream_cache_status always;
        }

        location /pacs/ {
            include /etc/nginx/cors_options.inc;
            limit_conn conn_per_ip 10;

            rewrite ^/pacs/(.*)$ /dcm4chee-arc/$1 break;
            proxy_pass https://viewmed_pacs;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 15s;
            proxy_send_timeout 15s;
            proxy_read_timeout 120s;

            proxy_set_header Host developer.viewmedonline.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Accept $http_accept;

            add_header X-Cache-Status $upstream_cache_status always;
        }

        location /health {
            access_log off;
            add_header Content-Type text/plain;
            rewrite ^ /dcm4chee-arc/aets/VIEWMED/rs break;
            proxy_pass https://viewmed_pacs;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }
    }
}
